<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ContractorAI – Your On-Site Assistant</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f4f0; min-height: 100vh; display: flex; flex-direction: column; }

  header { background: #1a1a1a; color: #fff; padding: 14px 24px; display: flex; align-items: center; gap: 12px; }
  .logo { width: 32px; height: 32px; background: #f5a623; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
  .logo svg { width: 18px; height: 18px; fill: #1a1a1a; }
  header h1 { font-size: 17px; font-weight: 600; letter-spacing: -0.2px; }
  header span { font-size: 12px; color: #888; margin-left: 4px; }

  .chat-wrapper { flex: 1; max-width: 780px; width: 100%; margin: 0 auto; display: flex; flex-direction: column; padding: 0 16px 16px; }

  .topic-bar { display: flex; gap: 8px; padding: 14px 0 10px; flex-wrap: wrap; }
  .topic-btn { background: #fff; border: 1px solid #ddd; border-radius: 20px; padding: 6px 14px; font-size: 12px; color: #444; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
  .topic-btn:hover { background: #f5a623; border-color: #f5a623; color: #1a1a1a; font-weight: 500; }

  .chat-box { flex: 1; background: #fff; border: 1px solid #e0deda; border-radius: 14px; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; min-height: 400px; max-height: 520px; }

  .msg { display: flex; gap: 10px; align-items: flex-start; }
  .msg.user { flex-direction: row-reverse; }
  .avatar { width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; }
  .avatar.bot { background: #f5a623; color: #1a1a1a; }
  .avatar.user { background: #1a1a1a; color: #fff; }
  .bubble { max-width: 82%; padding: 11px 15px; border-radius: 14px; font-size: 14px; line-height: 1.6; }
  .msg.bot .bubble { background: #f7f6f2; color: #222; border-bottom-left-radius: 4px; }
  .msg.user .bubble { background: #1a1a1a; color: #fff; border-bottom-right-radius: 4px; }

  .typing { display: flex; align-items: center; gap: 5px; padding: 10px 15px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: #aaa; animation: bounce 1.2s infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-6px); } }

  .input-row { display: flex; gap: 10px; margin-top: 12px; }
  .input-row input { flex: 1; padding: 12px 16px; border: 1.5px solid #ddd; border-radius: 10px; font-size: 14px; outline: none; transition: border 0.15s; background: #fff; }
  .input-row input:focus { border-color: #f5a623; }
  .input-row button { background: #1a1a1a; color: #fff; border: none; border-radius: 10px; padding: 12px 20px; font-size: 14px; font-weight: 500; cursor: pointer; transition: background 0.15s; }
  .input-row button:hover { background: #333; }
  .input-row button:disabled { background: #aaa; cursor: default; }

  .disclaimer { font-size: 11px; color: #aaa; text-align: center; padding: 8px 0 0; }

  .suggested { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .sug-btn { background: #fff; border: 1px solid #e0deda; border-radius: 8px; padding: 5px 11px; font-size: 12px; color: #555; cursor: pointer; transition: all 0.15s; }
  .sug-btn:hover { border-color: #f5a623; color: #1a1a1a; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
  </div>
  <div>
    <h1>ContractorAI <span>by Scelta</span></h1>
  </div>
</header>

<div class="chat-wrapper">
  <div class="topic-bar">
    <button class="topic-btn" onclick="askTopic('Permits & Approvals')">Permits & Approvals</button>
    <button class="topic-btn" onclick="askTopic('Materials & Costs')">Materials & Costs</button>
    <button class="topic-btn" onclick="askTopic('Project Timelines')">Project Timelines</button>
    <button class="topic-btn" onclick="askTopic('Subcontractors')">Subcontractors</button>
    <button class="topic-btn" onclick="askTopic('Building Codes')">Building Codes</button>
    <button class="topic-btn" onclick="askTopic('Safety & Compliance')">Safety & Compliance</button>
  </div>

  <div class="chat-box" id="chatBox">
    <div class="msg bot">
      <div class="avatar bot">AI</div>
      <div>
        <div class="bubble">Hey! I'm your AI construction assistant. Ask me anything about permits, materials, timelines, codes, or managing your job site. What's on your mind today?</div>
        <div class="suggested">
          <button class="sug-btn" onclick="sendSuggestion('How long does a building permit usually take?')">How long does a permit take?</button>
          <button class="sug-btn" onclick="sendSuggestion('What materials do I need for a residential deck?')">Materials for a deck?</button>
          <button class="sug-btn" onclick="sendSuggestion('How do I find reliable subcontractors?')">Finding subcontractors?</button>
        </div>
      </div>
    </div>
  </div>

  <div class="input-row">
    <input type="text" id="userInput" placeholder="Ask anything about your project..." onkeydown="if(event.key==='Enter') sendMessage()" />
    <button id="sendBtn" onclick="sendMessage()">Send</button>
  </div>
  <p class="disclaimer">Powered by Claude AI · For general guidance only · Always verify with local authorities</p>
</div>

<script>
const history = [];

const SYSTEM_PROMPT = `You are ContractorAI, a knowledgeable and practical assistant for contractors, tradespeople, and construction professionals. You help with:
- Building permits and approval processes
- Material selection, costs, and quantities
- Project timelines and scheduling
- Subcontractor management
- Building codes and compliance (focus on Canadian/Ontario context when relevant)
- Safety regulations and site management
- Client communication and project documentation

Keep answers practical, concise, and jargon-free enough for a contractor who is busy on-site. Use bullet points for lists. When giving cost estimates, always note they vary by region. Never give legal advice — suggest consulting a professional when needed. Be friendly and direct.`;

async function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  addMessage('user', text);
  await getAIResponse(text);
}

function sendSuggestion(text) {
  addMessage('user', text);
  getAIResponse(text);
}

function askTopic(topic) {
  const prompts = {
    'Permits & Approvals': 'What should I know about getting building permits approved quickly?',
    'Materials & Costs': 'What are the current cost considerations for common construction materials?',
    'Project Timelines': 'How do I create a realistic project timeline for a residential renovation?',
    'Subcontractors': 'What are best practices for managing subcontractors on a job site?',
    'Building Codes': 'What are the key building code requirements I should always check?',
    'Safety & Compliance': 'What are the most important safety compliance items for a job site?'
  };
  const msg = prompts[topic] || `Tell me about ${topic}`;
  addMessage('user', msg);
  getAIResponse(msg);
}

function addMessage(role, text) {
  const chatBox = document.getElementById('chatBox');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const initial = role === 'user' ? 'You' : 'AI';
  div.innerHTML = `<div class="avatar ${role}">${initial}</div><div class="bubble">${escapeHtml(text)}</div>`;
  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
  history.push({ role: role === 'user' ? 'user' : 'assistant', content: text });
}

function escapeHtml(text) {
  return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/^- (.+)$/gm,'• $1');
}

function showTyping() {
  const chatBox = document.getElementById('chatBox');
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.id = 'typing';
  div.innerHTML = `<div class="avatar bot">AI</div><div class="bubble"><div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

async function getAIResponse(userText) {
  const btn = document.getElementById('sendBtn');
  btn.disabled = true;
  showTyping();

  const messages = history.slice(0, -1).map(m => ({ role: m.role, content: m.content }));
  messages.push({ role: 'user', content: userText });

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': 'my-demo-key',
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: messages
      })
    });

    const data = await response.json();
    removeTyping();

    const reply = data.content?.[0]?.text || "Sorry, I couldn't get a response. Please try again.";
    const chatBox = document.getElementById('chatBox');
    const div = document.createElement('div');
    div.className = 'msg bot';
    div.innerHTML = `<div class="avatar bot">AI</div><div class="bubble">${escapeHtml(reply)}</div>`;
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
    history.push({ role: 'assistant', content: reply });
  } catch (err) {
    removeTyping();
    const chatBox = document.getElementById('chatBox');
    const div = document.createElement('div');
    div.className = 'msg bot';
    div.innerHTML = `<div class="avatar bot">AI</div><div class="bubble">Connection error. Please check your API key and try again.</div>`;
    chatBox.appendChild(div);
  }

  btn.disabled = false;
}
</script>
</body>
</html>
