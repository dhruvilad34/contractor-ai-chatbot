<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ContractorAI – Your On-Site Assistant</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f4f0; min-height: 100vh; display: flex; flex-direction: column; }

  header { background: #1a1a1a; color: #fff; padding: 14px 24px; display: flex; align-items: center; gap: 12px; }
  .logo { width: 32px; height: 32px; background: #f5a623; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
  .logo svg { width: 18px; height: 18px; fill: none; stroke: #1a1a1a; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  header h1 { font-size: 17px; font-weight: 600; letter-spacing: -0.2px; }
  header span { font-size: 12px; color: #888; margin-left: 4px; }

  .chat-wrapper { flex: 1; max-width: 780px; width: 100%; margin: 0 auto; display: flex; flex-direction: column; padding: 0 16px 16px; }

  .topic-bar { display: flex; gap: 8px; padding: 14px 0 10px; flex-wrap: wrap; }
  .topic-btn { background: #fff; border: 1px solid #ddd; border-radius: 20px; padding: 6px 14px; font-size: 12px; color: #444; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
  .topic-btn:hover, .topic-btn.active { background: #f5a623; border-color: #f5a623; color: #1a1a1a; font-weight: 500; }

  .chat-box { flex: 1; background: #fff; border: 1px solid #e0deda; border-radius: 14px; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; min-height: 420px; max-height: 520px; }

  .msg { display: flex; gap: 10px; align-items: flex-start; }
  .msg.user { flex-direction: row-reverse; }
  .avatar { width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; }
  .avatar.bot { background: #f5a623; color: #1a1a1a; }
  .avatar.user { background: #1a1a1a; color: #fff; }
  .bubble { max-width: 82%; padding: 11px 15px; border-radius: 14px; font-size: 14px; line-height: 1.7; }
  .msg.bot .bubble { background: #f7f6f2; color: #222; border-bottom-left-radius: 4px; }
  .msg.user .bubble { background: #1a1a1a; color: #fff; border-bottom-right-radius: 4px; }
  .bubble .point { display: block; padding: 2px 0 2px 4px; border-left: 2px solid #f5a623; margin: 4px 0; }

  .typing { display: flex; align-items: center; gap: 5px; padding: 10px 15px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: #aaa; animation: bounce 1.2s infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-6px); } }

  .input-row { display: flex; gap: 10px; margin-top: 12px; }
  .input-row input { flex: 1; padding: 12px 16px; border: 1.5px solid #ddd; border-radius: 10px; font-size: 14px; outline: none; transition: border 0.15s; background: #fff; }
  .input-row input:focus { border-color: #f5a623; }
  .input-row button { background: #1a1a1a; color: #fff; border: none; border-radius: 10px; padding: 12px 20px; font-size: 14px; font-weight: 500; cursor: pointer; transition: background 0.15s; }
  .input-row button:hover { background: #333; }

  .suggested { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .sug-btn { background: #fff; border: 1px solid #e0deda; border-radius: 8px; padding: 5px 11px; font-size: 12px; color: #555; cursor: pointer; transition: all 0.15s; }
  .sug-btn:hover { border-color: #f5a623; color: #1a1a1a; }
  .disclaimer { font-size: 11px; color: #aaa; text-align: center; padding: 8px 0 0; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
  </div>
  <div><h1>ContractorAI <span>by Scelta</span></h1></div>
</header>

<div class="chat-wrapper">
  <div class="topic-bar">
    <button class="topic-btn" onclick="askTopic('permits')">Permits & Approvals</button>
    <button class="topic-btn" onclick="askTopic('materials')">Materials & Costs</button>
    <button class="topic-btn" onclick="askTopic('timelines')">Project Timelines</button>
    <button class="topic-btn" onclick="askTopic('subcontractors')">Subcontractors</button>
    <button class="topic-btn" onclick="askTopic('codes')">Building Codes</button>
    <button class="topic-btn" onclick="askTopic('safety')">Safety & Compliance</button>
  </div>

  <div class="chat-box" id="chatBox">
    <div class="msg bot">
      <div class="avatar bot">AI</div>
      <div>
        <div class="bubble">Hey! I'm your AI construction assistant. Ask me anything about permits, materials, timelines, building codes, or managing your job site. What's on your mind?</div>
        <div class="suggested">
          <button class="sug-btn" onclick="sendMsg('How long does a building permit take in Ontario?')">How long does a permit take?</button>
          <button class="sug-btn" onclick="sendMsg('What materials do I need for a residential deck?')">Materials for a deck?</button>
          <button class="sug-btn" onclick="sendMsg('How do I find reliable subcontractors?')">Finding subcontractors?</button>
          <button class="sug-btn" onclick="sendMsg('What are common building code violations to avoid?')">Common code violations?</button>
        </div>
      </div>
    </div>
  </div>

  <div class="input-row">
    <input type="text" id="userInput" placeholder="Ask anything about your project..." onkeydown="if(event.key==='Enter') sendMsg()" />
    <button onclick="sendMsg()">Send</button>
  </div>
  <p class="disclaimer">ContractorAI · For general guidance only · Always verify with local authorities and licensed professionals</p>
</div>

const FALLBACKS = [
  "That's a great question! For specific guidance on that, I'd recommend consulting with your local municipality or a licensed contractor in your area. Is there something more specific I can help with — like permits, materials, timelines, or safety?",
  "I want to make sure I give you accurate info on that. Could you rephrase or give me a bit more context? I'm best at helping with permits, building codes, material costs, project timelines, subcontractor management, and job site safety.",
  "Good question — that one depends a lot on your specific location and project type. What province or city are you working in? And is this for a residential or commercial project? That'll help me point you in the right direction.",
  "For that specific question, I'd suggest checking with the Ontario Building Code or your local building department. Meanwhile, is there anything I can help with around permits, materials, timelines, or safety compliance?"
];

let fallbackIndex = 0;
let lastTopic = null;

function getResponse(input) {
  const text = input.toLowerCase();

  // Greeting
  if (/^(hi|hello|hey|sup|yo|good morning|good afternoon)/.test(text)) {
    return { answer: ["Hey! Good to have you here. I'm ContractorAI — your on-site construction assistant. What can I help you with today? You can ask me about permits, materials, timelines, building codes, subcontractors, or job site safety."], followups: ['How long does a permit take in Ontario?', 'What are current lumber costs?', 'What safety gear is required on site?'] };
  }

  // Thanks
  if (/thank|thanks|thx|appreciate/.test(text)) {
    return { answer: ["Happy to help! Feel free to ask anything else — permits, materials, codes, timelines, I've got you covered."], followups: [] };
  }

  // Search KB
  let bestMatch = null;
  let bestScore = 0;

  for (const [key, topic] of Object.entries(KB)) {
    let score = 0;
    for (const kw of topic.keywords) {
      if (text.includes(kw)) score += kw.length > 4 ? 2 : 1;
    }
    if (score > bestScore) { bestScore = score; bestMatch = topic; }
  }

  if (bestScore > 0) {
    lastTopic = bestMatch;
    return { answer: bestMatch.answer, followups: bestMatch.followups };
  }

  // Fallback
  const fb = FALLBACKS[fallbackIndex % FALLBACKS.length];
  fallbackIndex++;
  return { answer: [fb], followups: ['How do permits work in Ontario?', 'What materials do I need for a deck?', 'What are safety requirements on a job site?'] };
}

function formatAnswer(lines) {
  return lines.map(line => {
    if (line.startsWith('•')) {
      return `<span class="point">${line.replace(/^• /, '')}</span>`;
    }
    return `<p style="margin: 4px 0">${line}</p>`;
  }).join('');
}

function typeMessage(element, html, callback) {
  element.innerHTML = '';
  const temp = document.createElement('div');
  temp.innerHTML = html;
  const full = temp.innerHTML;
  let i = 0;
  const interval = setInterval(() => {
    i += 4;
    element.innerHTML = full.substring(0, i);
    if (i >= full.length) { element.innerHTML = full; clearInterval(interval); if (callback) callback(); }
  }, 8);
}

function addUserMessage(text) {
  const chatBox = document.getElementById('chatBox');
  const div = document.createElement('div');
  div.className = 'msg user';
  div.innerHTML = `<div class="avatar user">You</div><div class="bubble">${text.replace(/</g,'&lt;')}</div>`;
  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
}

function addBotMessage(lines, followups) {
  const chatBox = document.getElementById('chatBox');

  // Typing indicator
  const typing = document.createElement('div');
  typing.className = 'msg bot'; typing.id = 'typing';
  typing.innerHTML = `<div class="avatar bot">AI</div><div class="bubble"><div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
  chatBox.appendChild(typing);
  chatBox.scrollTop = chatBox.scrollHeight;

  setTimeout(() => {
    typing.remove();
    const div = document.createElement('div');
    div.className = 'msg bot';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    div.appendChild(document.createElement('div')).className = 'avatar bot';
    div.querySelector('.avatar').textContent = 'AI';
    div.appendChild(bubble);

    const wrapper = document.createElement('div');
    wrapper.appendChild(div);
    chatBox.appendChild(wrapper);

    const html = formatAnswer(lines);
    bubble.innerHTML = html;

    if (followups && followups.length) {
      const sugDiv = document.createElement('div');
      sugDiv.className = 'suggested';
      followups.forEach(f => {
        const btn = document.createElement('button');
        btn.className = 'sug-btn';
        btn.textContent = f;
        btn.onclick = () => sendMsg(f);
        sugDiv.appendChild(btn);
      });
      wrapper.appendChild(sugDiv);
    }

    chatBox.scrollTop = chatBox.scrollHeight;
  }, 700 + Math.random() * 400);
}

function sendMsg(overrideText) {
  const input = document.getElementById('userInput');
  const text = overrideText || input.value.trim();
  if (!text) return;
  input.value = '';
  addUserMessage(text);
  const response = getResponse(text);
  addBotMessage(response.answer, response.followups);
}

function askTopic(key) {
  const topicQuestions = {
    permits: 'How do I get a building permit in Ontario?',
